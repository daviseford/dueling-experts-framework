name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npm ci --prefix src/ui
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:ui

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npm ci --prefix src/ui --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:ui