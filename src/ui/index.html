<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACB — Agent Collaboration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }
    header .topic {
      font-size: 13px;
      color: #8b949e;
      margin-left: 12px;
    }
    #end-session-btn {
      background: #da3633;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #end-session-btn:hover { background: #f85149; }
    #end-session-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #pause-banner {
      display: none;
      background: #9e6a03;
      color: #fff;
      padding: 8px 20px;
      font-size: 13px;
      text-align: center;
    }
    #pause-banner.visible { display: block; }
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .turn {
      margin-bottom: 16px;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .turn-header {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .turn-body {
      padding: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .turn[data-from="claude"] .turn-header { background: #1f2a37; color: #79c0ff; }
    .turn[data-from="codex"] .turn-header { background: #1f2a20; color: #7ee787; }
    .turn[data-from="human"] .turn-header { background: #2a1f2a; color: #d2a8ff; }
    .turn[data-from="system"] .turn-header { background: #2a2a1f; color: #e3b341; }
    .turn[data-status="error"] { border-color: #da3633; }
    .turn[data-status="error"] .turn-header { background: #2d1214; color: #f85149; }
    .thinking {
      margin-bottom: 16px;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .thinking .turn-header {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .thinking[data-from="claude"] .turn-header { background: #1f2a37; color: #79c0ff; }
    .thinking[data-from="codex"] .turn-header { background: #1f2a20; color: #7ee787; }
    .thinking .thinking-body {
      padding: 16px 12px;
      font-size: 14px;
      color: #8b949e;
    }
    .thinking .dots {
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    #input-area {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }
    #interjection-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
    }
    #interjection-input:focus { border-color: #58a6ff; outline: none; }
    #send-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 6px 20px;
      font-size: 12px;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ACB <span class="topic" id="topic-label"></span></h1>
    </div>
    <button id="end-session-btn">End Session</button>
  </header>
  <div id="pause-banner">Session paused — agent needs human input</div>
  <div id="transcript"></div>
  <div id="input-area">
    <textarea id="interjection-input" rows="1" placeholder="Type a message to interject..."></textarea>
    <button id="send-btn">Send</button>
  </div>
  <div id="status-bar">
    <span id="status-text">Connecting...</span>
    <span id="turn-count">Turns: 0</span>
  </div>

  <script>
    const transcript = document.getElementById('transcript');
    const input = document.getElementById('interjection-input');
    const sendBtn = document.getElementById('send-btn');
    const endBtn = document.getElementById('end-session-btn');
    const pauseBanner = document.getElementById('pause-banner');
    const statusText = document.getElementById('status-text');
    const turnCountEl = document.getElementById('turn-count');
    const topicLabel = document.getElementById('topic-label');

    let lastTurnCount = 0;
    let fetchInFlight = false;
    let sendInFlight = false;
    let pollTimeoutId = null;
    let pollingStopped = false;

    const LABEL_MAP = { claude: 'CLAUDE', codex: 'CODEX', human: 'DAVIS', system: 'SYSTEM' };

    function fromLabel(from) {
      return LABEL_MAP[from] || from.toUpperCase();
    }

    function elapsedStr(since) {
      if (!since) return '';
      const secs = Math.round((Date.now() - new Date(since).getTime()) / 1000);
      if (secs < 60) return secs + 's';
      return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    }

    // Update the thinking indicator without a full re-render
    function updateThinking(thinking) {
      const existing = document.getElementById('thinking-indicator');
      if (!thinking) {
        if (existing) existing.remove();
        return;
      }
      if (existing) {
        // Update elapsed time
        const elapsed = existing.querySelector('.thinking-elapsed');
        if (elapsed) elapsed.textContent = elapsedStr(thinking.since);
      } else {
        // First time — append it
        appendThinkingIndicator(thinking);
      }
    }

    function appendThinkingIndicator(thinking) {
      const old = document.getElementById('thinking-indicator');
      if (old) old.remove();
      if (!thinking) return;

      const el = document.createElement('div');
      el.className = 'thinking';
      el.id = 'thinking-indicator';
      el.dataset.from = thinking.agent;

      const header = document.createElement('div');
      header.className = 'turn-header';
      const label = document.createElement('span');
      label.textContent = '[' + fromLabel(thinking.agent) + ']';
      header.appendChild(label);
      el.appendChild(header);

      const body = document.createElement('div');
      body.className = 'thinking-body';
      body.innerHTML = '<span class="dots">Thinking</span> <span class="thinking-elapsed">'
        + elapsedStr(thinking.since) + '</span>';
      el.appendChild(body);

      transcript.appendChild(el);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function schedulePoll() {
      if (pollingStopped) return;
      pollTimeoutId = setTimeout(poll, 3000);
    }

    function stopPolling() {
      pollingStopped = true;
      if (pollTimeoutId !== null) {
        clearTimeout(pollTimeoutId);
        pollTimeoutId = null;
      }
    }

    async function poll() {
      if (fetchInFlight) return; // Do NOT schedule another poll — avoids timer stacking
      fetchInFlight = true;

      try {
        const res = await fetch('/api/turns');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Discard stale responses but keep polling
        if (data.turn_count < lastTurnCount) {
          return;
        }

        // Always update status/topic (even when turn count unchanged)
        if (data.topic) {
          topicLabel.textContent = '\u2014 ' + data.topic;
        }
        statusText.textContent = data.session_status === 'completed'
          ? 'Session completed'
          : data.session_status === 'paused'
            ? 'Paused \u2014 waiting for human'
            : 'Active';
        turnCountEl.textContent = 'Turns: ' + data.turn_count;
        if (data.session_status === 'paused') {
          pauseBanner.classList.add('visible');
        } else {
          pauseBanner.classList.remove('visible');
        }

        // Update thinking indicator on every poll
        updateThinking(data.thinking);

        // Skip DOM re-render if turn count unchanged
        if (data.turn_count === lastTurnCount && data.session_status !== 'completed') {
          return;
        }

        lastTurnCount = data.turn_count;

        // Render turns
        transcript.innerHTML = '';
        for (const turn of data.turns) {
          const el = document.createElement('div');
          el.className = 'turn';
          el.dataset.from = turn.from;
          el.dataset.status = turn.status;

          const header = document.createElement('div');
          header.className = 'turn-header';

          const headerLeft = document.createElement('span');
          headerLeft.textContent = '[' + fromLabel(turn.from) + '] Turn ' + turn.turn;
          const headerRight = document.createElement('span');
          headerRight.textContent = turn.timestamp || '';
          header.appendChild(headerLeft);
          header.appendChild(headerRight);

          const body = document.createElement('div');
          body.className = 'turn-body';
          body.textContent = turn.content;

          el.appendChild(header);
          el.appendChild(body);
          transcript.appendChild(el);
        }

        // Append thinking indicator if an agent is working
        appendThinkingIndicator(data.thinking);

        // Auto-scroll to bottom on new content
        transcript.scrollTop = transcript.scrollHeight;

        // Stop polling and disable controls if completed
        if (data.session_status === 'completed') {
          sendBtn.disabled = true;
          endBtn.disabled = true;
          input.disabled = true;
          stopPolling();
          return;
        }
      } catch (err) {
        if (!pollingStopped) {
          statusText.textContent = 'Connection error: ' + err.message;
        }
      } finally {
        fetchInFlight = false;
        schedulePoll();
      }
    }

    // Send interjection — guarded against double-send
    async function doSend() {
      if (sendInFlight) return;
      const content = input.value.trim();
      if (!content) return;

      sendInFlight = true;
      sendBtn.disabled = true;
      try {
        const res = await fetch('/api/interject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        if (res.ok) {
          input.value = '';
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to send');
        }
      } catch (err) {
        alert('Failed to send: ' + err.message);
      } finally {
        sendInFlight = false;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', doSend);

    // Enter to send (shift+enter for newline, respect IME composition)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        doSend();
      }
    });

    // End session — re-enable button on failure
    endBtn.addEventListener('click', async () => {
      if (!confirm('End this session?')) return;
      endBtn.disabled = true;
      try {
        await fetch('/api/end-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
      } catch {
        endBtn.disabled = false;
      }
    });

    // Start polling
    poll();
  </script>
</body>
</html>
